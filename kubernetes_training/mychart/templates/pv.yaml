{{- if .Values.persistentVolume.enabled }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "mychart.fullname" . }}-pv
  labels:
    {{- include "mychart.labels" . | nindent 4 }}
spec:
  capacity:
    storage: {{ .Values.persistentVolume.capacity }}
  accessModes:
    {{- toYaml .Values.persistentVolume.accessModes | nindent 4 }}
  hostPath:
    path: {{ .Values.persistentVolume.hostPath.path }}
    type: {{ .Values.persistentVolume.hostPath.type }}
  persistentVolumeReclaimPolicy: {{ .Values.persistentVolume.reclaimPolicy }}
{{- end }}
{{- if .Values.persistentVolumeClaim.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mychart.fullname" . }}-pvc
  labels:
    {{- include "mychart.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.persistentVolumeClaim.accessModes | nindent 4 }}
  storageClassName: {{ .Values.persistentVolumeClaim.storageClassName | quote }}
  resources:
    requests:
      storage: {{ .Values.persistentVolumeClaim.storage }}
{{- end }}

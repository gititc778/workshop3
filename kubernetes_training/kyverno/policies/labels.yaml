apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-app-label
spec:
  validationFailureAction: enforce
  rules:
  - name: check-label
    match:
      resources:
        kinds:
          - Pod
    validate:
      message: "All pods must have an 'app' label."
      pattern:
        metadata:
          labels:
            app: "?*"

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hpm-ingress
  namespace: default
spec:
  ingressClassName: nginx
  rules:
  - host: hpm.itclabs.live
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hospital-frontend
            port:
              number: 80